services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: momentum
      POSTGRES_USER: momentum
      POSTGRES_PASSWORD: momentum
    ports:
      - "5432:5432"
    volumes:
      - momentum_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  momentum_postgres:

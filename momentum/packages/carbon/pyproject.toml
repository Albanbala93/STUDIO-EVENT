[project]
name = "momentum-carbon"
version = "0.1.0"
description = "Carbon estimation helpers for Momentum."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8"
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "momentum-scoring"
version = "0.1.0"
description = "Scoring engine for Momentum KPI measurements."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8"
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
